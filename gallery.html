<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="description" content="View the media archive of RIT Education and Welfare Society. Official photographs of our skill centers and welfare activities.">
  <link rel="stylesheet" href="assets/css/style.css?v=2.0.3">

  <meta property="og:description" content="Media archive of RIT Education and Welfare Society. Headquartered in Kota, Rajasthan.">

  <!-- Organization Schema -->
  <script type="application/ld+json">

    "@context": "https://schema.org",
    "@type": "NGO",
    "name": "RIT Education and Welfare Society",
    "url": "index.html",
    "logo": "assets/images/RIT logo 2.png",
    "foundingDate": "2014",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "B-9, Shri Ram Colony, Borkheda",
      "addressLocality": "Kota",
      "addressRegion": "Rajasthan",
      "postalCode": "324001",
      "addressCountry": "IN"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+91-96676-09999",
      "contactType": "Enquiry Desk",
      "email": "riteducation013@gmail.com"
    }
  }

</head>
<body>

  <!-- Top Info Bar (Dynamic) -->
  <div id="topbar-placeholder"></div>

  <!-- Sticky Navbar (Dynamic) -->
  <nav id="navbar-placeholder" class="navbar"></nav>

  <!-- Page Banner -->
  <section class="page-banner">
    <div class="container">
      <h1 class="page-title">Media Gallery</h1>
      <div class="page-breadcrumbs">
        <a href="index.html">Home</a>
        <span>/</span>
        <span>Gallery</span>
      </div>
    </div>
  </section>

  <!-- Gallery Section -->
  <section class="section">
    <div class="container">
      <div class="section-title-wrapper">
        <span class="hero-tag" style="background-color: rgba(244, 163, 0, 0.08); color: var(--accent-hover);">Visual Archive</span>
        <h2 class="section-title">Our Activities in Pictures</h2>
        <p class="section-subtitle">A collection of real-time images capturing vocational trainings, student programs, and welfare initiatives.</p>
      </div>



      <!-- Gallery Grid -->
      <div class="gallery-grid" id="full-gallery-container">
        <!-- Rendered Dynamically from data.js based on category filter -->
      </div>
    </div>
  </section>

  <!-- Lightbox Modal Container -->
  <div class="lightbox-modal" id="lightbox-modal" onclick="closeLightbox()">
    <div class="lightbox-content-wrapper" onclick="event.stopPropagation()">
      <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
      <img id="lightbox-img" src="" alt="Zoomed view" class="lightbox-img">
      <div class="lightbox-caption">
        <h4 id="lightbox-title">Image Title</h4>
      </div>
    </div>
  </div>

  <!-- Footer (Dynamic) -->
  <footer id="footer-placeholder" class="footer"></footer>

  <!-- Floating Actions (Dynamic) -->
  <div id="floating-actions-placeholder"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/data.js?v=2.0.0"></script>
  <script src="assets/js/components.js?v=2.0.3"></script>
  <script src="assets/js/main.js?v=2.0.0"></script>
</body>
</html>
