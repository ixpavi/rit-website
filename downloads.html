<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads Library - RIT Education and Welfare Society</title>
  <meta name="description" content="Download official registration documents, audit reports, and brochure templates of RIT Education and Welfare Society.">
  <link rel="stylesheet" href="assets/css/style.css?v=2.0.3">
  <link rel="icon" type="image/png" href="assets/images/RIT%20logo%202.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Downloads Library - RIT Education and Welfare Society">
  <meta property="og:description" content="Official registration credentials and brochure downloads for RIT Education and Welfare Society.">
  <meta property="og:image" content="assets/images/RIT%20logo%202.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Downloads Library - RIT Education and Welfare Society">
  <meta property="twitter:description" content="Official registration credentials and brochure downloads for RIT Education and Welfare Society.">
  <meta property="twitter:image" content="assets/images/RIT%20logo%202.png">

  <!-- Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NGO",
    "name": "RIT Education and Welfare Society",
    "url": "index.html",
    "logo": "assets/images/RIT logo 2.png",
    "foundingDate": "2014",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "B-9, Shri Ram Colony, Borkheda",
      "addressLocality": "Kota",
      "addressRegion": "Rajasthan",
      "postalCode": "324001",
      "addressCountry": "IN"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+91-96676-09999",
      "contactType": "Enquiry Desk",
      "email": "riteducation013@gmail.com"
    }
  }
  </script>
</head>
<body>

  <!-- Top Info Bar (Dynamic) -->
  <div id="topbar-placeholder"></div>

  <!-- Sticky Navbar (Dynamic) -->
  <nav id="navbar-placeholder" class="navbar"></nav>

  <!-- Page Banner -->
  <section class="page-banner">
    <div class="container">
      <h1 class="page-title">Downloads Library</h1>
      <div class="page-breadcrumbs">
        <a href="index.html">Home</a>
        <span>/</span>
        <span>Downloads</span>
      </div>
    </div>
  </section>

  <!-- Downloads Section -->
  <section class="section">
    <div class="container">
      <div class="vmo-card" style="text-align: center; padding: 5rem 2rem; max-width: 600px; margin: 0 auto; border-top: 4px solid var(--secondary);">
        <i data-lucide="file-text" style="width: 48px; height: 48px; color: var(--secondary); margin-bottom: 1.5rem; display: inline-block;"></i>
        <h2 style="color: var(--primary); margin-bottom: 0.5rem; font-size: 1.8rem; font-weight: 700;">Downloads Library</h2>
        <p style="color: var(--text-muted); font-size: 1.15rem; margin: 0; line-height: 1.6;">Documents will be uploaded soon.</p>
      </div>
    </div>
  </section>

  <!-- Hidden elements to preserve selectors -->
  <div id="full-downloads-container" style="display:none;"></div>

  <!-- Footer (Dynamic) -->
  <footer id="footer-placeholder" class="footer"></footer>

  <!-- Floating Actions (Dynamic) -->
  <div id="floating-actions-placeholder"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/data.js?v=2.0.0"></script>
  <script src="assets/js/components.js?v=2.0.3"></script>
  <script src="assets/js/main.js?v=2.0.0"></script>
</body>
</html>
